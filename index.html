<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>TopCasinos</title>
<link rel="stylesheet" href="tc-styles.css"/>
</head>
<body>

<!-- AUTH PAGE -->
<!-- LOADING SCREEN -->
<div id="loading-screen" style="position:fixed;inset:0;background:#050a18;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
  <div style="margin-bottom:24px;">
    <svg width="80" height="80" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="35" fill="none" stroke="#1a3a7c" stroke-width="6"/>
      <circle cx="40" cy="40" r="35" fill="none" stroke="#4ade80" stroke-width="6"
        stroke-dasharray="60 160" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0 40 40" to="360 40 40" dur="1s" repeatCount="indefinite"/>
      </circle>
    </svg>
  </div>
  <div style="font-size:26px;font-weight:900;color:#fff;letter-spacing:1px;">Top<span style="color:#f6c90e;">Casinos</span></div>
  <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:8px;letter-spacing:2px;">LOADING...</div>
</div>

<div id="p-auth" class="page active">
  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo">Top<span>Casinos</span></div>
      <div class="auth-sub">Premium sports betting & casino</div>
      <div class="auth-tabs">
        <div class="auth-tab active" id="tl">Login</div>
        <div class="auth-tab" id="tr">Register</div>
      </div>
      <div id="fl">
        <div class="af"><label>Username</label><input type="text" id="lu" placeholder="Enter username" autocomplete="username"/></div>
        <div class="af"><label>Password</label><input type="password" id="lp" placeholder="Enter password" autocomplete="current-password"/></div>
        <button class="auth-btn" id="lbtn">Login</button>
      </div>
      <div id="fr" style="display:none;">
        <div class="af"><label>Username</label><input type="text" id="ru" placeholder="Choose username"/></div>
        <div class="af"><label>Password</label><input type="password" id="rp" placeholder="Min 4 characters"/></div>
        <div class="af"><label>Confirm Password</label><input type="password" id="rp2" placeholder="Confirm password"/></div>
        <!-- Anti-bot math captcha -->
        <div class="af" id="captcha-wrap" style="background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <label style="font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:0.5px;">Verify you are human</label>
            <button type="button" onclick="refreshCaptcha()" style="background:none;border:none;color:var(--accent);font-size:11px;cursor:pointer;font-weight:600;">Refresh</button>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div id="captcha-q" style="font-size:18px;font-weight:900;color:var(--txt);background:var(--card);padding:8px 16px;border-radius:8px;border:1px solid var(--border);letter-spacing:2px;min-width:80px;text-align:center;"></div>
            <span style="font-size:18px;color:var(--txt2);">=</span>
            <input type="number" id="captcha-a" placeholder="?" style="width:70px;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);color:var(--txt);font-size:16px;font-weight:700;text-align:center;outline:none;"/>
          </div>
          <div id="captcha-err" style="color:#e74c3c;font-size:11px;margin-top:6px;display:none;">Wrong answer. Please try again.</div>
        </div>
        <button class="auth-btn" id="rbtn">Create Account</button>
      </div>
      <div class="aerr" id="aerr"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">
  <div class="top-header">
    <div class="brand">Top<span>Casinos</span></div>
    <div class="hdr-r">
      <div id="notifbtn" class="hbtn" style="position:relative;">🔔<span class="nbadge" id="nbadge">0</span></div>
      <div class="bal-show" id="bshow">Rs. 0</div>
    </div>
  </div>

  <!-- HOME -->
  <div id="pg-home" class="mcontent page active">
    <!-- Sport search - hidden until sports loaded -->
    <div id="sport-search-wrap" style="display:none;" class="ssearch">
      <input class="ssinp" id="ssinp" placeholder="Search team, league or sport..."/>
      <button class="ssbtn" id="ssbtn">Search</button>
    </div>
    <!-- Sport category tabs -->
    <div id="sport-cats-wrap" style="display:none;">
      <div class="spcats" id="sport-cats"></div>
    </div>
    <!-- Sport betting section -->
    <div class="slabel" id="sport-section-label" style="display:none;">Sports Betting</div>
    <div id="spscroll" style="display:none;"></div>
    <!-- Hot games -->
    <div class="slabel" id="hot-section-label" style="display:none;">Hot Games</div>
    <div class="hotscroll" id="hotscroll"></div>
    <!-- Casino Sections -->
    <div id="cgrid"></div>
    <div style="height:8px;"></div>
  </div>

  <!-- HISTORY -->
  <div id="pg-hist" class="mcontent page">
    <div class="htabs">
      <div class="htab active" id="ht-sp">⚽ Sports Bets</div>
      <div class="htab" id="ht-ca">🎰 Casino</div>
    </div>
    <div id="hlist"></div>
  </div>

  <!-- DEPOSIT/WD -->
  <div id="pg-dw" class="mcontent page">
    <!-- DEPOSIT / WITHDRAWAL TABS -->
    <div style="display:flex;border-bottom:2px solid var(--border);margin-bottom:0;">
      <div id="dw-tab-dep" onclick="switchDWTab('dep')" style="flex:1;padding:12px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;color:var(--accent);border-bottom:3px solid var(--accent);margin-bottom:-2px;">Deposit</div>
      <div id="dw-tab-wd" onclick="switchDWTab('wd')" style="flex:1;padding:12px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;color:var(--txt2);border-bottom:3px solid transparent;margin-bottom:-2px;">Withdraw</div>
    </div>

    <!-- ══ DEPOSIT PAGE ══ -->
    <div id="dw-dep" class="dwpg">
      <!-- Contact Agents -->
      <div class="dwsec">
        <div class="dwh" style="display:flex;justify-content:space-between;align-items:center;">
          <span>Contact Agent</span>
          <button onclick="loadContactAgents()" style="background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;">Refresh</button>
        </div>
        <div class="dwb" id="contact-agents-wrap">
          <div style="color:var(--txt2);font-size:13px;padding:0.5rem 0;">Loading...</div>
        </div>
      </div>
      <!-- Dynamic deposit sections loaded from Firebase -->
      <div id="deposit-sections-wrap"></div>
    </div>

    <!-- ══ WITHDRAWAL PAGE ══ -->
    <div id="dw-wd" class="dwpg" style="display:none;">
      <!-- Dynamic withdrawal sections loaded from Firebase -->
      <div id="withdraw-sections-wrap"></div>
      <!-- Withdrawal options filled by loadWithdrawSections() -->
    </div><!-- end dw-wd -->
  </div><!-- end pg-dw -->
